<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kick Drum</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <h1>Kick Drum Synth</h1>
      <fieldset class="knobs">
        <div class="knob-row">
          <label for="pitchDecay">Pitch decay</label>
          <div class="knob-control">
            <input
              id="pitchDecay"
              type="range"
              min="0.02"
              max="0.8"
              step="0.01"
              value="0.12"
            />
            <span id="pitchDecayVal" class="knob-value" aria-live="polite">0.12</span>
          </div>
        </div>
        <div class="knob-row">
          <label for="gainDecay">Gain decay</label>
          <div class="knob-control">
            <input
              id="gainDecay"
              type="range"
              min="0.03"
              max="1.5"
              step="0.01"
              value="0.18"
            />
            <span id="gainDecayVal" class="knob-value" aria-live="polite">0.18</span>
          </div>
        </div>
      </fieldset>
      <button id="kickBtn" type="button">Play</button>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
