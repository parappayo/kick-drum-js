<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kick Drum</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <h1>Kick Drum Synth</h1>
      <fieldset class="knobs">
        <div class="knob-row">
          <label class="knob-label" for="pitchDecay">Pitch decay (s)</label>
          <div class="knob-field" data-knob>
            <input
              id="pitchDecay"
              class="knob-range-input"
              type="range"
              min="0.02"
              max="0.8"
              step="0.01"
              value="0.12"
            />
            <div class="knob-dial" aria-hidden="true">
              <svg class="knob-svg" viewBox="0 0 64 64" aria-hidden="true">
                <circle
                  class="knob-track"
                  cx="32"
                  cy="32"
                  r="26"
                  fill="none"
                  stroke-width="4"
                />
                <g class="knob-needle" transform="rotate(0 32 32)">
                  <line class="knob-indicator-line" x1="32" y1="32" x2="32" y2="10" />
                </g>
              </svg>
            </div>
            <span id="pitchDecayVal" class="knob-value" aria-live="polite">0.12</span>
          </div>
        </div>
        <div class="knob-row">
          <label class="knob-label" for="gainDecay">Gain decay (s)</label>
          <div class="knob-field" data-knob>
            <input
              id="gainDecay"
              class="knob-range-input"
              type="range"
              min="0.03"
              max="1.5"
              step="0.01"
              value="0.18"
            />
            <div class="knob-dial" aria-hidden="true">
              <svg class="knob-svg" viewBox="0 0 64 64" aria-hidden="true">
                <circle
                  class="knob-track"
                  cx="32"
                  cy="32"
                  r="26"
                  fill="none"
                  stroke-width="4"
                />
                <g class="knob-needle" transform="rotate(0 32 32)">
                  <line class="knob-indicator-line" x1="32" y1="32" x2="32" y2="10" />
                </g>
              </svg>
            </div>
            <span id="gainDecayVal" class="knob-value" aria-live="polite">0.18</span>
          </div>
        </div>
      </fieldset>
      <button id="kickBtn" type="button">Play</button>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
